<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Anokha TechFair 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2c3e50;
            --accent-blue: #3498db;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            --bg-light: #f5f5f5;
            --text-dark: #333;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Login Container */
        #login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Poppins', sans-serif;
            margin-bottom: 24px;
            color: var(--primary-blue);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #555;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }

        .login-btn:hover {
            background: #1a252f;
        }

        .error-message {
            color: var(--danger-red);
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        /* Dashboard Container */
        #dashboard-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            height: 40px;
        }

        .header-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-blue);
        }

        .logout-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: var(--danger-red);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'Poppins', sans-serif;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #777;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th,
        .data-table td {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
            font-family: 'Poppins', sans-serif;
        }

        .data-table td {
            font-size: 0.95rem;
        }

        .team-name {
            font-weight: 500;
            color: var(--primary-blue);
        }

        .view-btn {
            padding: 6px 14px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .view-btn:hover {
            opacity: 0.9;
        }

        .live-count {
            font-weight: 700;
            color: var(--primary-blue);
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .live-count.active {
            color: var(--success-green);
            background: #d1fae5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            padding: 0 8px;
        }

        .close-modal:hover {
            color: var(--text-dark);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feedback-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #666;
        }

        .feedback-rating {
            color: #FFD43B;
            font-size: 1.1rem;
        }

        .feedback-text {
            color: #333;
            line-height: 1.5;
        }

        .no-data {
            text-align: center;
            color: #888;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .header-title {
                font-size: 1.2rem;
            }

            .data-table th,
            .data-table td {
                padding: 12px 10px;
            }

            .view-btn {
                padding: 6px 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Login Overlay -->
    <div id="login-container">
        <div class="login-card">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" class="form-input" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••">
                </div>
                <div id="loginError" class="error-message">Invalid email or password</div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard-container">
        <header class="header">
            <div class="header-left">
                <img src="assets/BLACK LOGO.webp" alt="Logo" class="header-logo">
                <div class="header-title">TechFair Dashboard</div>
            </div>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalTeams">0</div>
                <div class="stat-label">Total Teams</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFeedback">0</div>
                <div class="stat-label">Total Feedback Received</div>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Team Name</th>
                        <th style="width: 150px;">Live Count</th>
                        <th style="width: 150px;">Avg. Rating</th>
                        <th style="width: 150px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="teamsTableBody">
                    <!-- Rows generated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Feedback Detail Modal -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTeamTitle">Team Feedback</div>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="feedbackListContainer" class="feedback-list">
                    <!-- Feedback items -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collectionGroup, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCOaBiBOWhxuhalFXqTVwZgMD7ScyM342E",
            authDomain: "anokha-techfair-2026-qr.firebaseapp.com",
            projectId: "anokha-techfair-2026-qr",
            storageBucket: "anokha-techfair-2026-qr.firebasestorage.app",
            messagingSenderId: "223357261790",
            appId: "1:223357261790:web:b43b76b11a9b0984416f4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // DOM Elements
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const tableBody = document.getElementById('teamsTableBody');
        const modal = document.getElementById('feedbackModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const feedbackListContainer = document.getElementById('feedbackListContainer');
        const modalTeamTitle = document.getElementById('modalTeamTitle');
        const totalTeamsEl = document.getElementById('totalTeams');
        const totalFeedbackEl = document.getElementById('totalFeedback');

        let allFeedbackData = [];
        const teamIds = [];

        // Initialize Table
        function createRow(id, count, avgRating) {
            const row = document.createElement('tr');
            row.id = `row-${id}`;
            const activeClass = count > 0 ? 'active' : '';
            row.innerHTML = `
          <td><span class="team-name">${id}</span></td>
          <td><span class="live-count ${activeClass}" id="count-${id}">${count}</span></td>
          <td><span style="font-weight:600; color:#f39c12;" id="rating-${id}">${avgRating}</span></td>
          <td><button class="view-btn" onclick="openFeedbackModal('${id}')">View Feedback</button></td>
        `;
            tableBody.appendChild(row);
        }

        // Expose modal function globally
        window.openFeedbackModal = (teamId) => {
            const teamFeedback = allFeedbackData.filter(f => f.pageId === teamId)
                .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

            modalTeamTitle.textContent = `${teamId} - Feedback (${teamFeedback.length})`;
            feedbackListContainer.innerHTML = '';

            if (teamFeedback.length === 0) {
                feedbackListContainer.innerHTML = '<div class="no-data">No feedback received for this team yet.</div>';
            } else {
                teamFeedback.forEach(item => {
                    const date = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString() : 'N/A';
                    const stars = '★'.repeat(item.rating) + '☆'.repeat(5 - item.rating);

                    const el = document.createElement('div');
                    el.className = 'feedback-item';
                    el.innerHTML = `
            <div class="feedback-header">
              <span>${item.email || 'Anonymous'}</span>
              <span>${date}</span>
            </div>
            <div class="feedback-rating">${stars}</div>
            <div class="feedback-text">${item.feedback || 'No comment provided.'}</div>
          `;
                    feedbackListContainer.appendChild(el);
                });
            }
            modal.style.display = 'flex';
        };

        // Listen for Realtime Feedback
        let unsubscribeSnapshot = null;

        function setupRealtimeListener() {
            if (unsubscribeSnapshot) return;

            // Note: Removed orderBy('timestamp', 'desc') temporarily. 
            // Collection Group queries with orderBy require a Firestore Index.
            // If you re-enable it, check the browser console for a link to create the index.
            const q = query(collectionGroup(db, 'feedback'));

            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                allFeedbackData = [];
                const counts = {};
                const ratingsSum = {};
                const uniqueTeamIds = new Set();

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allFeedbackData.push(data);

                    if (data.pageId) {
                        uniqueTeamIds.add(data.pageId);
                        counts[data.pageId] = (counts[data.pageId] || 0) + 1;
                        ratingsSum[data.pageId] = (ratingsSum[data.pageId] || 0) + (parseInt(data.rating) || 0);
                    }
                });

                // Update UI
                totalFeedbackEl.textContent = allFeedbackData.length;
                totalTeamsEl.textContent = uniqueTeamIds.size;

                // Clear table and rebuild
                tableBody.innerHTML = '';

                // Sort IDs alphanumerically
                const sortedIds = Array.from(uniqueTeamIds).sort();

                sortedIds.forEach(id => {
                    const count = counts[id] || 0;
                    let avgRating = '-';
                    if (count > 0) {
                        avgRating = (ratingsSum[id] / count).toFixed(1) + ' ★';
                    }
                    createRow(id, count, avgRating);
                });
            }, (error) => {
                console.error("Error fetching feedback:", error);
                // Display error to user
                const errDiv = document.createElement('div');
                errDiv.style.color = 'red';
                errDiv.style.padding = '20px';
                errDiv.style.textAlign = 'center';
                errDiv.textContent = `Error loading data: ${error.message}. Check console for details.`;
                dashboardContainer.insertBefore(errDiv, dashboardContainer.firstChild);
            });
        }

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.style.display = 'none';
                dashboardContainer.style.display = 'block';
                setupRealtimeListener();
            } else {
                loginContainer.style.display = 'flex';
                dashboardContainer.style.display = 'none';
                if (unsubscribeSnapshot) {
                    unsubscribeSnapshot();
                    unsubscribeSnapshot = null;
                }
            }
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    console.error(error);
                    loginError.style.display = 'block';
                    loginError.textContent = "Invalid credentials. Please try again.";
                });
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // Modal Close Logic
        closeModalBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
        };

        // Init
        // logic moved to onSnapshot listener

    </script>
</body>

</html>
